<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldMark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7e57c2"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="640" cy="360" rx="520" ry="300" fill="url(#glow)" opacity="0.22"/>

  <!-- ===== header ===== -->
  <!-- shield + sentinel-eye mark -->
  <g transform="translate(64,50)">
    <path d="M36 2 L70 14 V44 C70 66 54 80 36 88 C18 80 2 66 2 44 V14 Z"
          fill="url(#shieldMark)" stroke="#c4b5fd" stroke-width="1.6"/>
    <path d="M16 44 C24 32 48 32 56 44 C48 56 24 56 16 44 Z"
          fill="#f1ecff" stroke="#5b3da8" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="36" cy="44" r="9" fill="#7e57c2"/>
    <circle cx="36" cy="44" r="3.6" fill="#2f2153"/>
  </g>

  <text x="156" y="90" font-size="58" font-weight="800" letter-spacing="-1">
    <tspan fill="#e6edf3">pr</tspan><tspan fill="#a78bfa">-sentinel</tspan>
  </text>
  <text x="158" y="130" font-size="25" font-weight="500" fill="#8b949e" letter-spacing="0.2">
    Wake your session on CI failures and merge conflicts
  </text>
  <text x="1216" y="130" text-anchor="end" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#6e7681">github.com/karlkfi/claude-pr-sentinel</text>

  <!-- ===== watcher panel ===== -->
  <g>
    <rect x="64" y="172" width="1152" height="360" rx="18" fill="#0b0f16" stroke="#222b38" stroke-width="1.5"/>
    <!-- title bar -->
    <path d="M64 190 a18 18 0 0 1 18 -18 H1198 a18 18 0 0 1 18 18 V216 H64 Z" fill="#11161f"/>
    <circle cx="92" cy="194" r="6" fill="#ff5f56"/>
    <circle cx="114" cy="194" r="6" fill="#ffbd2e"/>
    <circle cx="136" cy="194" r="6" fill="#27c93f"/>
    <text x="640" y="199" text-anchor="middle" font-size="16" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#6e7681">background watcher · sleeps, then exits to wake the session</text>
  </g>

  <!-- ===== four exit events ===== -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">

    <!-- row 1: a required check failed -->
    <g transform="translate(96,244)">
      <rect x="0" y="0" width="128" height="36" rx="18" fill="#2a1618" stroke="#a5303a" stroke-width="1.5"/>
      <circle cx="20" cy="18" r="7.5" fill="none" stroke="#f85149" stroke-width="2.6"/>
      <line x1="14.9" y1="23.1" x2="25.1" y2="12.9" stroke="#f85149" stroke-width="2.6" stroke-linecap="round"/>
      <text x="46" y="24" font-size="17" font-weight="700" font-family="-apple-system, sans-serif" fill="#f85149">failed</text>
    </g>
    <text x="246" y="270" font-size="23" fill="#c9d1d9">a required check <tspan fill="#f85149" font-weight="700">failed</tspan> — report carries the sanitized log excerpt</text>

    <!-- row 2: the base moved, PR now conflicts -->
    <g transform="translate(96,316)">
      <rect x="0" y="0" width="128" height="36" rx="18" fill="#2a2210" stroke="#9e6a03" stroke-width="1.5"/>
      <path d="M20 10 l9 15 h-18 Z" fill="none" stroke="#e3b341" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="20" y1="16" x2="20" y2="20" stroke="#e3b341" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="20" cy="23" r="1.2" fill="#e3b341"/>
      <text x="46" y="24" font-size="17" font-weight="700" font-family="-apple-system, sans-serif" fill="#e3b341">conflict</text>
    </g>
    <text x="246" y="342" font-size="23" fill="#c9d1d9">the base branch moved — <tspan fill="#e3b341" font-weight="700">heal</tspan> the conflict, then push</text>

    <!-- row 3: all green, mergeable -->
    <g transform="translate(96,388)">
      <rect x="0" y="0" width="128" height="36" rx="18" fill="#12261a" stroke="#238636" stroke-width="1.5"/>
      <path d="M15 18 l5 5 l10 -12" fill="none" stroke="#3fb950" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="46" y="24" font-size="17" font-weight="700" font-family="-apple-system, sans-serif" fill="#3fb950">ready</text>
    </g>
    <text x="246" y="414" font-size="23" fill="#c9d1d9">all checks <tspan fill="#3fb950" font-weight="700">green</tspan> and mergeable — nothing left to babysit</text>

    <!-- row 4: PR merged or closed -->
    <g transform="translate(96,460)">
      <rect x="0" y="0" width="128" height="36" rx="18" fill="#1b2129" stroke="#3d4451" stroke-width="1.5"/>
      <circle cx="20" cy="18" r="7" fill="none" stroke="#8b949e" stroke-width="2.4"/>
      <circle cx="20" cy="18" r="2.6" fill="#8b949e"/>
      <text x="46" y="24" font-size="17" font-weight="700" font-family="-apple-system, sans-serif" fill="#8b949e">closed</text>
    </g>
    <text x="246" y="486" font-size="23" fill="#c9d1d9">the PR was <tspan fill="#adbac7" font-weight="700">merged or closed</tspan> — the sentinel stands down</text>
  </g>

  <!-- caption -->
  <text x="640" y="586" text-anchor="middle" font-size="22" font-weight="500" fill="#c9d1d9">
    Zero idle tokens — wakes only when the PR needs you, from <tspan fill="#c4b5fd" font-weight="700">GitHub check state</tspan> alone, <tspan fill="#f85149" font-weight="700">never</tspan> PR comments.
  </text>
</svg>
